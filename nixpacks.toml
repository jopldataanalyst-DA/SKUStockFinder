providers = ["python", "node"]

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r backend/requirements.txt",
  "cd frontend && npm ci",
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "mkdir -p backend/static && cp -r frontend/dist/. backend/static/",
]

[start]
cmd = "cd backend && . /opt/venv/bin/activate && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
